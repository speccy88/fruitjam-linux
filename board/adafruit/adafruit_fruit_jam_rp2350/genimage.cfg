image flash-image.bin {
	hdimage {
		partition-table-type = "none"
	}

	partition bootloader {
		in-partition-table = "no"
		image = "bootloader.bin"
		offset = 0
	}

	partition adafruit_fruit_jam_rp2350.dtb {
		in-partition-table = "no"
		image = "adafruit_fruit_jam_rp2350.dtb"
	}

	partition Image {
		in-partition-table = "no"
		image = "Image"
	}

	partition cramfs {
		offset = 6M
		size = 2M
		in-partition-table = "no"
		image = rootfs.cramfs
		sparse = "yes"
	}
}
