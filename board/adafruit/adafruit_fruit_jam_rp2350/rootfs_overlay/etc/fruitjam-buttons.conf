# Fruit Jam button action defaults.
#
# The daemon reads this file first, then overrides it with
# /mnt/sd/fruitjam/buttons.conf when that file exists.
DB_PATH=/mnt/sd/fruitjam/buttons.db
MQTT_HOST=
MQTT_PORT=1883
MQTT_TOPIC=fruitjam/buttons
MQTT_CLIENT_ID=fruitjam-rp2350
MQTT_USER=
MQTT_PASSWORD=
# Use "airlift" after joining WiFi with airliftctl, or "socket" for a future
# kernel/netdev path.
MQTT_TRANSPORT=socket
POLL_MS=50
